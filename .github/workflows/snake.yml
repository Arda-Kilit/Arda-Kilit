name: GitHub Contribution Snake

# Workflow tetikleyicileri
on:
  push:
    branches:
      - main       # Ana branch’in adı (kendi ana branch’inle değiştir)
  workflow_dispatch:  # Manuel çalıştırma için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Repo’yu çek
      - name: Checkout repository
        uses: actions/checkout@v3

      # Snake SVG oluştur
      - name: Generate Snake
        uses: platane/snk@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_path: ./output/snake.svg

      # SVG’yi commit ve push et
      - name: Commit & Push Snake
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/snake.svg
          git commit -m "Update contribution snake" || echo "No changes to commit"
          git push origin output
